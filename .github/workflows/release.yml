name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Extract changelog from commit message
        id: changelog
        run: |
          COMMIT_MSG=$(git log -1 --pretty=format:"%B")
          echo "COMMIT_MSG<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMIT_MSG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build module zip
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          ZIP_NAME="HyperOS3-Debloat-${VERSION}.zip"
          mkdir -p /tmp/module/META-INF/com/google/android
          cp install.sh uninstall.sh module.prop pkg_map.sh /tmp/module/
          echo '#MAGISK' > /tmp/module/META-INF/com/google/android/updater-script
          printf '#!/sbin/sh\numask 022\nui_print() { echo "$1"; }\nrequire_new_magisk() {\n  ui_print "*******************************"\n  ui_print " Please install Magisk v20.4+! "\n  ui_print "*******************************"\n  exit 1\n}\nOUTFD=$2\nZIPFILE=$3\nmount /data 2>/dev/null\n[ -f /data/adb/magisk/util_functions.sh ] || require_new_magisk\n. /data/adb/magisk/util_functions.sh\n[ $MAGISK_VER_CODE -lt 20400 ] && require_new_magisk\ninstall_module\nexit 0\n' > /tmp/module/META-INF/com/google/android/update-binary
          cd /tmp/module && zip -r "/tmp/${ZIP_NAME}" .
          cp "/tmp/${ZIP_NAME}" ${GITHUB_WORKSPACE}/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: HyperOS3-Debloat ${{ steps.version.outputs.VERSION }}
          draft: ${{ contains(steps.version.outputs.VERSION, 'beta') || contains(steps.version.outputs.VERSION, 'alpha') || contains(steps.version.outputs.VERSION, 'rc') }}
          prerelease: false
          make_latest: ${{ !contains(steps.version.outputs.VERSION, 'beta') && !contains(steps.version.outputs.VERSION, 'alpha') && !contains(steps.version.outputs.VERSION, 'rc') }}
          body: |
            ## ${{ steps.version.outputs.VERSION }}

            ${{ steps.changelog.outputs.COMMIT_MSG }}

            ---

            ### 安装方法
            1. 下载 `HyperOS3-Debloat-${{ steps.version.outputs.VERSION }}.zip`
            2. 在 KernelSU 管理器中从本地安装
            3. 重启生效

            ### 精简模式
            | 模式 | 说明 |
            |------|------|
            | ✅ 快速精简（推荐） | 小爱推荐+无障碍+游戏 |
            | ⚡ 标准精简 | +云服务+跨屏+汽车+互联+应用商店 |
            | 🔥 深度精简 | +AI全部+负一屏+弹幕+窗口+系统服务 |
            | 🎛️ 自定义模式 | 每组可选：全部精简/保留核心/全部保留 |
          files: |
            HyperOS3-Debloat-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
